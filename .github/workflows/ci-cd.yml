name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  id-token: write
  contents: read

jobs:
  build-backend:
    name: Build Backend (.NET)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore backend/IFIS.Api/IFIS.Api.csproj

    - name: Build
      run: dotnet build backend/IFIS.Api/IFIS.Api.csproj --no-restore --configuration Release

    - name: Publish API
      run: dotnet publish backend/IFIS.Api/IFIS.Api.csproj -c Release -o ./publish/backend

    - name: Upload Backend Artifact
      uses: actions/upload-artifact@v6
      with:
        name: backend-build
        path: ./publish/backend

  build-frontend:
    name: Build Frontend (Angular)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: frontend/ifis-web/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend/ifis-web
        npm ci

    - name: Build Angular App
      run: |
        cd frontend/ifis-web
        npm run build

    - name: Upload Frontend Artifact
      uses: actions/upload-artifact@v6
      with:
        name: frontend-build
        path: frontend/ifis-web/dist/ifis-web

  build-docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
    - uses: actions/checkout@v6

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Login to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ secrets.ACR_NAME }}.azurecr.io
        username: ${{ secrets.AZURE_CLIENT_ID }}
        password: ${{ secrets.AZURE_CLIENT_SECRET }} # Fallback if OIDC isn't fully configured for Docker Push

    - name: Build and Push Backend Image
      run: |
        docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/ifis-backend:${{ github.sha }} -t ${{ secrets.ACR_NAME }}.azurecr.io/ifis-backend:latest ./backend/IFIS.Api
        docker push ${{ secrets.ACR_NAME }}.azurecr.io/ifis-backend:${{ github.sha }}
        docker push ${{ secrets.ACR_NAME }}.azurecr.io/ifis-backend:latest

    - name: Build and Push Frontend Image
      run: |
        docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/ifis-frontend:${{ github.sha }} -t ${{ secrets.ACR_NAME }}.azurecr.io/ifis-frontend:latest ./frontend/ifis-web
        docker push ${{ secrets.ACR_NAME }}.azurecr.io/ifis-frontend:${{ github.sha }}
        docker push ${{ secrets.ACR_NAME }}.azurecr.io/ifis-frontend:latest

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Deploy Backend to Container App
      uses: azure/container-apps-deploy-action@v2
      with:
        appSourcePath: ${{ github.workspace }}/backend/IFIS.Api
        acrName: ${{ secrets.ACR_NAME }}
        containerAppName: ${{ secrets.AZURE_BACKEND_APP_NAME }}
        resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
        imageToDeploy: ${{ secrets.ACR_NAME }}.azurecr.io/ifis-backend:${{ github.sha }}

    - name: Deploy Frontend to Container App
      uses: azure/container-apps-deploy-action@v2
      with:
        appSourcePath: ${{ github.workspace }}/frontend/ifis-web
        acrName: ${{ secrets.ACR_NAME }}
        containerAppName: ${{ secrets.AZURE_FRONTEND_APP_NAME }}
        resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
        imageToDeploy: ${{ secrets.ACR_NAME }}.azurecr.io/ifis-frontend:${{ github.sha }}
