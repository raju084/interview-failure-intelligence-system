name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-backend:
    name: Build Backend (.NET)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore backend/IFIS.Api/IFIS.Api.csproj

    - name: Build
      run: dotnet build backend/IFIS.Api/IFIS.Api.csproj --no-restore --configuration Release

    - name: Publish API
      run: dotnet publish backend/IFIS.Api/IFIS.Api.csproj -c Release -o ./publish/backend

    - name: Upload Backend Artifact
      uses: actions/upload-artifact@v4
      with:
        name: backend-build
        path: ./publish/backend

  build-frontend:
    name: Build Frontend (Angular)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: frontend/ifis-web/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend/ifis-web
        npm ci

    - name: Build Angular App
      run: |
        cd frontend/ifis-web
        npm run build

    - name: Upload Frontend Artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: frontend/ifis-web/dist/ifis-web

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
    - uses: actions/checkout@v4

    - name: Build Backend Image
      run: |
        docker build -t ifis-backend:latest ./backend/IFIS.Api

    - name: Build Frontend Image
      run: |
        docker build -t ifis-frontend:latest ./frontend/ifis-web
